{% extends 'gateway/base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 2rem auto; padding: 2.5rem; background: #ffffff; border-radius: 16px; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.08);">
    <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Chào mừng quay lại</h2>
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; font-size: 1.2rem;">Đăng nhập</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Chưa có tài khoản? <a href="{% url 'register' %}" style="color: var(--accent); text-decoration: none;">Đăng ký ngay</a><br><br>
        <a href="{% url 'staff_login' %}" style="color: #64748b; text-decoration: underline; font-size: 0.9rem;">Dành cho Nhân viên / Quản trị viên</a>
    </p>
</div>
{% endblock %}
