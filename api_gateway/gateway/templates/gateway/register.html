{% extends 'gateway/base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 2rem auto; padding: 2.5rem; background: #ffffff; border-radius: 16px; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.08);">
    <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Tạo tài khoản</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Tên đăng nhập</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" name="full_name" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Số điện thoại</label>
            <input type="text" name="phone" required>
        </div>
        <div class="form-group">
            <label>Địa chỉ</label>
            <input type="text" name="address" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; font-size: 1.2rem;">Đăng ký</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Đã có tài khoản? <a href="{% url 'login' %}" style="color: var(--accent); text-decoration: none;">Đăng nhập tại đây</a>
    </p>
</div>
{% endblock %}
