events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Cấu hình log định dạng JSON
    log_format json_tracking escape=json
    '{'
        '"timestamp": "$time_iso8601",'
        '"client_ip": "$remote_addr",'
        '"request_method": "$request_method",'
        '"request_uri": "$request_uri",'
        '"request_body": "$request_body",'
        '"status": $status'
    '}';

    server {
        listen 9000;
        server_name localhost;

        # Bật đọc body của request (cần cho log POST body)
        client_body_buffer_size 128k;


        # ── ĐỊNH TUYẾN MICROSERVICES ─────────────────────────────────────────
        
        location /api/user/ {
            proxy_pass http://user-service:9001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/orders/ {
            proxy_pass http://order-service:9002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/payments/ {
            proxy_pass http://payment-service:9003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/shipments/ {
            proxy_pass http://shipment-service:9004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/ai/ {
            proxy_pass http://ai-service:9005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/cart/ {
            proxy_pass http://cart-service:9006;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/products/ {
            proxy_pass http://product-service:9008;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/catalogs/ {
            proxy_pass http://product-service:9008;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/reviews/ {
            proxy_pass http://review-service:9009;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend Service (Mọi request không hợp lệ / không thuộc api)
        location / {
            proxy_pass http://frontend-service:9010;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
