{% extends 'frontend_app/shared/base.html' %}
{% block content %}
<div style="max-width: 450px; margin: 2rem auto; padding: 2.5rem; background: #ffffff; border-radius: 16px; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.08);">
    <div style="text-align: center; font-size: 3rem; margin-bottom: 1rem;">🛡️</div>
    <h2 style="text-align: center; margin-bottom: 2rem; font-size: 1.8rem; color: #1e293b;">Cổng Đăng Nhập<br>Nhân Viên</h2>
    <form method="post" action="{% url 'staff_login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label>Mã nhân viên / Tên đăng nhập</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; font-size: 1.2rem; background: #0f172a; border-color: #0f172a;">Đăng nhập hệ thống</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Chuyển sang <a href="{% url 'login' %}" style="color: var(--accent); text-decoration: none; font-weight: 600;">Khu vực khách hàng</a>
    </p>
</div>
{% endblock %}
