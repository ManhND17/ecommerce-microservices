{% extends 'frontend_app/shared/base.html' %}
{% block content %}
<div class="container animate-up" style="display: flex; justify-content: center; align-items: center; min-height: 90vh; padding: 4rem 0;">
    <div class="glass-card" style="padding: 3rem; background: white; width: 100%; max-width: 550px;">
        <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem; font-weight: 800;">Tạo tài khoản mới</h2>
        
        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div style="grid-column: 1 / -1; margin-bottom: 0.5rem;">
                    <label style="display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;">Tên đăng nhập</label>
                    <input type="text" name="username" required style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
                </div>
                <div>
                    <label style="display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;">Họ và tên</label>
                    <input type="text" name="full_name" required style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
                </div>
                <div>
                    <label style="display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;">Số điện thoại</label>
                    <input type="text" name="phone" required style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
                </div>
                <div style="grid-column: 1 / -1;">
                    <label style="display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;">Email</label>
                    <input type="email" name="email" required style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
                </div>
                <div style="grid-column: 1 / -1;">
                    <label style="display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;">Địa chỉ</label>
                    <input type="text" name="address" required style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0;">
                </div>
                <div style="grid-column: 1 / -1; margin-bottom: 1rem;">
                    <label style="display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;">Mật khẩu</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" required style="width: 100%; padding: 12px; padding-right: 45px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none;">
                        <button type="button" onclick="togglePassword('password', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <script>
                    function togglePassword(inputId, btn) {
                        const input = document.getElementById(inputId);
                        const icon = btn.querySelector('svg');
                        if (input.type === 'password') {
                            input.type = 'text';
                            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                        } else {
                            input.type = 'password';
                            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                        }
                    }
                </script>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 1.1rem; margin-top: 2rem;">Đăng ký ngay</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
            Đã có tài khoản? <a href="{% url 'login' %}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Đăng nhập tại đây</a>
        </div>
    </div>
</div>
{% endblock %}
