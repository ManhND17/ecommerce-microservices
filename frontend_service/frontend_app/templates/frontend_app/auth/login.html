{% extends 'frontend_app/shared/base.html' %}
{% block content %}
<div class="container animate-up" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="glass-card" style="padding: 3rem; background: white; width: 100%; max-width: 480px;">
        <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem; font-weight: 800;">Chào mừng trở lại</h2>
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;">Tên đăng nhập</label>
                <input type="text" name="username" required style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px;">Mật khẩu</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" required style="width: 100%; padding: 12px; padding-right: 45px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none;">
                    <button type="button" onclick="togglePassword('password', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center;">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>

            <script>
                function togglePassword(inputId, btn) {
                    const input = document.getElementById(inputId);
                    const icon = btn.querySelector('svg');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                    } else {
                        input.type = 'password';
                        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                    }
                }
            </script>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 1.1rem; margin-top: 1rem;">Đăng nhập</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
            Chưa có tài khoản? <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 700; text-decoration: none;">Đăng ký ngay</a>
        </div>
    </div>
</div>
{% endblock %}
