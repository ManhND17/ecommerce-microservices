services:

  # ── MICROSERVICES ───────────────────────────────────────────────────────────

  api-gateway:
    image: nginx:alpine
    ports:
      - "${GATEWAY_PORT}:9000"
    volumes:
      - ./api_gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-service
    networks:
      - technova_net

  frontend-service:
    build: .
    command: >
      sh -c "python frontend_service/manage.py makemigrations frontend_app && python frontend_service/manage.py migrate && 
             python frontend_service/manage.py runserver 0.0.0.0:${FRONTEND_PORT}"
    volumes:
      - .:/app
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - DB_NAME=log_tracking_db
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
      - USER_SERVICE_URL=http://user-service:${USER_SERVICE_PORT}/api/user/
      - PRODUCT_SERVICE_URL=http://product-service:${PRODUCT_SERVICE_PORT}/api/products/
      - ORDER_SERVICE_URL=http://order-service:${ORDER_SERVICE_PORT}/api/
      - PAYMENT_SERVICE_URL=http://payment-service:${PAYMENT_SERVICE_PORT}/api/
      - SHIPMENT_SERVICE_URL=http://shipment-service:${SHIPMENT_SERVICE_PORT}/api/
      - CART_SERVICE_URL=http://cart-service:${CART_SERVICE_PORT}/api/
      - REVIEW_SERVICE_URL=http://review-service:${REVIEW_SERVICE_PORT}/api/reviews/
      - AI_SERVICE_URL=http://ai-service:${AI_SERVICE_PORT}/api/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  user-service:
    build: .
    command: >
      sh -c "python user_service/manage.py migrate && 
             python user_service/manage.py runserver 0.0.0.0:${USER_SERVICE_PORT}"
    volumes:
      - .:/app
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    environment:
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=user_db
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  product-service:
    build: .
    command: >
      sh -c "python product_service/manage.py migrate && 
             python product_service/manage.py runserver 0.0.0.0:${PRODUCT_SERVICE_PORT}"
    volumes:
      - .:/app
    ports:
      - "${PRODUCT_SERVICE_PORT}:${PRODUCT_SERVICE_PORT}"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=product_db
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - JWT_SECRET=super-secret-jwt-key-xyz
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net


  cart-service:
    build: .
    command: >
      sh -c "python cart_service/manage.py migrate &&
             python cart_service/manage.py runserver 0.0.0.0:${CART_SERVICE_PORT}"
    volumes:
      - .:/app
    ports:
      - "${CART_SERVICE_PORT}:${CART_SERVICE_PORT}"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=cart_db
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
    networks:
      - technova_net

  order-service:
    build: .
    command: >
      sh -c "python order_service/manage.py migrate && 
             python order_service/manage.py runserver 0.0.0.0:${ORDER_SERVICE_PORT}"
    volumes:
      - .:/app
    ports:
      - "${ORDER_SERVICE_PORT}:${ORDER_SERVICE_PORT}"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=order_db
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  order-consumer:
    build: .
    command: python order_service/orders/consumers.py
    volumes:
      - .:/app
    environment:
      - DB_NAME=order_db
      - DB_HOST=host.docker.internal
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/app/order_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  payment-service:
    build: .
    command: >
      sh -c "python payment_service/manage.py migrate && 
             python payment_service/manage.py runserver 0.0.0.0:${PAYMENT_SERVICE_PORT}"
    volumes:
      - .:/app
    ports:
      - "${PAYMENT_SERVICE_PORT}:${PAYMENT_SERVICE_PORT}"
    environment:
      - DB_NAME=payment_db
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
      - SECRET_KEY=django-insecure-payment-key
      - VNPAY_URL=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - VNPAY_TMN_CODE=YOUR_TMN_CODE
      - VNPAY_HASH_SECRET=YOUR_HASH_SECRET
      - VNPAY_RETURN_URL=http://localhost:${FRONTEND_PORT}/payments/vnpay-return/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  payment-consumer:
    build: .
    command: python payment_service/payments/consumers.py
    volumes:
      - .:/app
    environment:
      - DB_NAME=payment_db
      - DB_HOST=host.docker.internal
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/app/payment_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  shipment-service:
    build: .
    command: >
      sh -c "python shipment_service/manage.py migrate && 
             python shipment_service/manage.py runserver 0.0.0.0:${SHIPMENT_SERVICE_PORT}"
    volumes:
      - .:/app
    ports:
      - "${SHIPMENT_SERVICE_PORT}:${SHIPMENT_SERVICE_PORT}"
    environment:
      - DB_NAME=shipment_db
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
      - SECRET_KEY=django-insecure-shipment-key
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  shipment-consumer:
    build: .
    command: python shipment_service/shipments/consumers.py
    volumes:
      - .:/app
    environment:
      - DB_NAME=shipment_db
      - DB_HOST=host.docker.internal
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/app/shipment_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    ports:
      - "${AI_SERVICE_PORT}:${AI_SERVICE_PORT}"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - PRODUCT_SERVICE_URL=http://product-service:${PRODUCT_SERVICE_PORT}/api/products/
      - CATALOG_SERVICE_URL=http://product-service:${PRODUCT_SERVICE_PORT}/api/catalogs/
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./ai_service:/app
      - ai_model_cache:/root/.cache
    depends_on:
      - rabbitmq
      - neo4j
    networks:
      - technova_net

  review-service:
    build:
      context: ./review_service
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:${REVIEW_SERVICE_PORT}"
    volumes:
      - ./review_service:/app
    ports:
      - "${REVIEW_SERVICE_PORT}:${REVIEW_SERVICE_PORT}"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=review_db
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
    networks:
      - technova_net

  neo4j:
    image: neo4j:5.12
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data
    networks:
      - technova_net

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "6672:5672"
      - "15673:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - technova_net

volumes:
  ai_model_cache:
  neo4j_data:

networks:
  technova_net:
    driver: bridge

