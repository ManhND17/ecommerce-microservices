version: '3.8'

services:

  # ── MICROSERVICES ───────────────────────────────────────────────────────────

  api-gateway:
    build: .
    command: >
      sh -c "python api_gateway/manage.py migrate && 
             python api_gateway/manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=log_tracking_db
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  user-service:
    build: .
    command: >
      sh -c "python user_service/manage.py migrate && 
             python user_service/manage.py runserver 0.0.0.0:8001"
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=user_db
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  product-service:
    build: .
    command: >
      sh -c "python product_service/manage.py migrate && 
             python product_service/manage.py runserver 0.0.0.0:8008"
    volumes:
      - .:/app
    ports:
      - "8008:8008"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=product_db
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  cart-service:
    build: .
    command: >
      sh -c "python cart_service/manage.py migrate &&
             python cart_service/manage.py runserver 0.0.0.0:8007"
    volumes:
      - .:/app
    ports:
      - "8007:8007"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=cart_db
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
    networks:
      - technova_net

  order-service:
    build: .
    command: >
      sh -c "python order_service/manage.py migrate && 
             python order_service/manage.py runserver 0.0.0.0:8003"
    volumes:
      - .:/app
    ports:
      - "8003:8003"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=order_db
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  order-consumer:
    build: .
    command: python order_service/orders/consumers.py
    volumes:
      - .:/app
    environment:
      - DB_NAME=order_db
      - DB_HOST=host.docker.internal
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/app/order_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  payment-service:
    build: .
    command: >
      sh -c "python payment_service/manage.py migrate && 
             python payment_service/manage.py runserver 0.0.0.0:8004"
    volumes:
      - .:/app
    ports:
      - "8004:8004"
    environment:
      - DB_NAME=payment_db
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
      - SECRET_KEY=django-insecure-payment-key
      - VNPAY_URL=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - VNPAY_TMN_CODE=YOUR_TMN_CODE
      - VNPAY_HASH_SECRET=YOUR_HASH_SECRET
      - VNPAY_RETURN_URL=http://localhost:8000/payments/vnpay-return/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  payment-consumer:
    build: .
    command: python payment_service/payments/consumers.py
    volumes:
      - .:/app
    environment:
      - DB_NAME=payment_db
      - DB_HOST=host.docker.internal
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/app/payment_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  shipment-service:
    build: .
    command: >
      sh -c "python shipment_service/manage.py migrate && 
             python shipment_service/manage.py runserver 0.0.0.0:8005"
    volumes:
      - .:/app
    ports:
      - "8005:8005"
    environment:
      - DB_NAME=shipment_db
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
      - SECRET_KEY=django-insecure-shipment-key
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  shipment-consumer:
    build: .
    command: python shipment_service/shipments/consumers.py
    volumes:
      - .:/app
    environment:
      - DB_NAME=shipment_db
      - DB_HOST=host.docker.internal
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/app/shipment_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - technova_net

  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    ports:
      - "8006:8006"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - PRODUCT_SERVICE_URL=http://product-service:8008/api/products/
      - CATALOG_SERVICE_URL=http://product-service:8008/api/catalogs/
      - BEHAVIOR_SERVICE_URL=http://behavior-service:8009/api/logs/export/
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./ai_service:/app
      - ai_model_cache:/root/.cache
    depends_on:
      - rabbitmq
      - neo4j
    networks:
      - technova_net

  behavior-service:
    build: .
    command: >
      sh -c "python behavior_service/manage.py migrate &&
             python behavior_service/manage.py runserver 0.0.0.0:8009"
    volumes:
      - .:/app
    ports:
      - "8009:8009"
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=behavior_db
      - DB_USER=postgres
      - DB_PASSWORD=123456
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
    networks:
      - technova_net

  neo4j:
    image: neo4j:5.12
    container_name: neo4j
    environment:
      - NEO4J_AUTH=none
    volumes:
      - neo4j_data:/data
    networks:
      - technova_net

  rabbitmq:
    image: rabbitmq:3.12-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - technova_net

volumes:
  ai_model_cache:
  neo4j_data:

networks:
  technova_net:
    driver: bridge
